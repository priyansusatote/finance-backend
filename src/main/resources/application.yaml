spring:
  application:
    name: finance-backend


  datasource:
    url: jdbc:postgresql://localhost:5432/finance_db
    username: postgres
    password: postgres

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

jwt:
  secret: ${JWT_SECRET}
  expiration: 3600000  # 1hr


server:
  port: 8080